name: Multi-Platform CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
            cxx: g++
            cc: gcc
            exe: ./orbit
          - os: macos-latest
            compiler: gcc
            cxx: g++
            cc: gcc
            exe: ./orbit
          - os: macos-latest
            compiler: clang
            cxx: clang++
            cc: clang
            exe: ./orbit
          - os: windows-latest
            compiler: gcc
            cxx: g++
            cc: gcc
            exe: ./orbit.exe
          - os: windows-latest
            compiler: clang
            cxx: clang++
            cc: clang
            exe: ./orbit.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GCC (Linux)
        if: matrix.compiler == 'gcc' && matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y g++ gcc

      - name: Install GCC (macOS)
        if: matrix.compiler == 'gcc' && matrix.os == 'macos-latest'
        run: brew install gcc

      - name: Install Clang (macOS)
        if: matrix.compiler == 'clang' && matrix.os == 'macos-latest'
        run: clang++ --version

      - name: Compile
        run: ${{ matrix.cxx }} -o ${{ matrix.exe }} src/orbit.cpp -std=c++23

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: orbit-${{ matrix.os }}-${{ matrix.compiler }}-v1.1
          path: ${{ matrix.exe }}

      - name: Test
        run: ${{ matrix.exe }} --help
