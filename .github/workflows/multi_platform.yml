name: Multi-Platform CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
            cxx: g++
            cc: gcc
          - os: macos-latest
            compiler: gcc
            cxx: g++-14
            cc: gcc-14
          - os: macos-latest
            compiler: clang
            cxx: clang++
            cc: clang
          - os: windows-latest
            compiler: gcc
            cxx: g++
            cc: gcc
          - os: windows-latest
            compiler: clang
            cxx: clang++
            cc: clang

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GCC (Linux)
        if: matrix.compiler == 'gcc' && matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y g++ gcc

      - name: Install GCC (macOS)
        if: matrix.compiler == 'gcc' && matrix.os == 'macos-latest'
        run: brew install gcc

      - name: Install Clang (macOS)
        if: matrix.compiler == 'clang' && matrix.os == 'macos-latest'
        run: clang++ --version

      - name: Configure CMake
        shell: bash
        run: |
          GENERATOR=""
          [[ "${{ matrix.os }}" == "windows-latest" ]] && GENERATOR="-G \"MinGW Makefiles\""
          cmake -B build -S . $GENERATOR \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            -DCMAKE_C_COMPILER=${{ matrix.cc }}

      - name: Build
        run: cmake --build build

      - name: Determine binary path
        shell: bash
        run: |
          BINARY="build/orbit"
          [[ "${{ runner.os }}" == "Windows" ]] && BINARY="build/orbit.exe"
          echo "BINARY=$BINARY" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: orbit-${{ matrix.os }}-${{ matrix.compiler }}-v1.1
          path: ${{ env.BINARY }}

      - name: Test
        run: ${{ env.BINARY }} --help
